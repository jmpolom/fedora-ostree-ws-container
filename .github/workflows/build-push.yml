name: Build and push workstation image

on:
  workflow_call:
    inputs:
      containerfile:
        required: true
        type: string
      from_tag:
        required: true
        type: string
      release_version:
        required: true
        type: string
      tag_suffix:
        required: true
        type: string
    secrets:
      actions_token:
        required: true

jobs:
  build-push-image:
    name: Build and push ostree image
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
      - name: build image
        id: build-image
        uses: redhat-actions/buildah-build@v2
        with:
          image: fedora-silverblue-ws
          tags: ${{ inputs.release_version }}${{ inputs.tag_suffix }} ${{ github.sha }}${{ inputs.tag_suffix }}
          containerfiles: ${{ inputs.containerfile }}
          build-args: |
            release=${{ inputs.release_version }}
            tag=${{ inputs.from_tag }}
      - name: push image
        id: push-image
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build-image.outputs.image }}
          tags: ${{ steps.build-image.outputs.tags }}
          registry: ghcr.io/${{ github.repository_owner }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.actions_token }}
