name: Build and push workstation image set

on:
  workflow_call:
    inputs:
      release_version:
        required: true
        type: string
    secrets:
      actions_token:
        required: true

jobs:
  build-push-base-image:
    name: Build base workstation image
    uses: ./.github/workflows/build-push.yml
    with:
      containerfile: ./Containerfile.workstation
      from_tag: ${{ inputs.release_version }}
      release_version: ${{ inputs.release_version }}
      tag_suffix: -${{ github.ref_name }}
    secrets:
      actions_token: ${{ secrets.GITHUB_TOKEN }}
